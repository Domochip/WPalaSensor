<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{APP_MODEL}}">
    <title>Domochip {{APP_MODEL}}</title>

    <link rel="stylesheet" href="pure-min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="side-menu.css">
    <style>
        .infotip {
            background: #1Cb841;
            padding: 0.3em 0.3em;
            border-radius: 3px;
            color: #fff;
            font-weight: bold;
        }

        .infotipdiv {
            background: #1Cb841;
            padding: 0.3em 1em;
            border-radius: 3px;
            color: #fff;
            margin-bottom: 0.5em;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id="layout">
        <!-- Menu toggle -->
        <a href="#menu" id="menuLink" class="menu-link">
            <!-- Hamburger icon -->
            <span></span>
        </a>

        <div id="menu">
            <div class="pure-menu">
                <div class="pure-menu-heading" style="padding-left:0.5em;">Domochip</div>
                <div class="pure-menu-heading" style="padding-left:0.5em; padding-top: 0;" id="menuModel">{{APP_MODEL}}</div>

                <ul class="pure-menu-list">
                    <li class="pure-menu-item" id="menuStatus"><a href="" class="pure-menu-link">Status</a></li>
                    <li class="pure-menu-item" id="menuConfig"><a href="" class="pure-menu-link">Config</a></li>
                    <li class="pure-menu-item" id="menuFirmware"><a href="" class="pure-menu-link">Firmware</a></li>
                </ul>
            </div>
        </div>

        <div id="main">
            <div class="header">
                <h1 id="mainHeader"></h1>
            </div>

            <div class="content" id="content"></div>
        </div>
    </div>

<!-- TEMPLATES -->

    <script>
        function $(selector, el = document) {
            return el.querySelector(selector);
        }
    </script>
    <script src="side-menu.js"></script>
    <script>
        const loadedScripts = new Set();

        function loadScript(code) {
            const script = document.createElement('script');
            const blob = new Blob([code], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            script.src = url;
            script.onload = () => URL.revokeObjectURL(url);
            document.head.appendChild(script);
            loadedScripts.add(script);
        }

        function unloadScripts() {
            loadedScripts.forEach(script => {
                if (script.src) { URL.revokeObjectURL(script.src); }
                document.head.removeChild(script);
            });
            loadedScripts.clear();
        }

        function request(method, url, data, success, fail, timeout, uploadProgress) {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = () => {
                if (xhr.readyState === XMLHttpRequest.DONE) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        if (typeof success === 'function') success(xhr.response);
                    } else {
                        if (typeof fail === 'function') fail(xhr.response);
                    }
                }
            };
            if (uploadProgress && xhr.upload) { xhr.upload.onprogress = uploadProgress; }
            xhr.open(method, url);
            if (timeout) xhr.timeout = timeout;
            if (typeof data == "string") xhr.setRequestHeader('Content-type', 'application/json');
            xhr.send(data);
        }

        // Loads a page from an embedded <template> element into the target element.
        // Scripts inside the template are executed via loadScript (scripts in innerHTML don't auto-execute).
        function load(element, templateId) {
            const tpl = document.getElementById(templateId);
            element.innerHTML = tpl.innerHTML;
            const scriptList = element.getElementsByTagName('script');
            for (const script of scriptList) {
                loadScript(script.innerHTML);
            }
        }

        function get(url, success, fail) {
            request("GET", url, null, success, fail);
        }

        function getJSON(url, success, fail) {
            request("GET", url, null, function (response) {
                success(JSON.parse(response));
            }, fail);
        }

        function post(url, data, success, fail, timeout, uploadProgress) {
            request("POST", url, data, success, fail, timeout, uploadProgress);
        }

        function convertFormDataToJson(formData) {
            const object = {};
            formData.forEach((value, key) => {
                // Reflect.has in favor of: object.hasOwnProperty(key)
                if (!Reflect.has(object, key)) {
                    object[key] = value;
                    return;
                }
                if (!Array.isArray(object[key])) {
                    object[key] = [object[key]];
                }
                object[key].push(value);
            });
            return JSON.stringify(object);
        }

        function rssiToQuality(rssi) {
            return Math.min(Math.max(2 * (rssi + 100), 0), 100);
        }

        function rssiToColor(rssi) {
            return `hsl(${rssiToQuality(rssi) * 1.2}, 100%, 45%)`;
        }

        function fadeOut(el) {
            if (!el || el.style.display === 'none') return; // Check if el is null or undefined

            el.style.opacity = 1;
            const duration = 400; // Duration of the fade-out effect in milliseconds
            const start = Date.now();

            function tick() {
                if (!el) return; // Check if el is null or undefined

                const elapsed = Date.now() - start;
                el.style.opacity = Math.max(1 - elapsed / duration, 0);

                if (elapsed < duration) {
                    requestAnimationFrame(tick);
                } else {
                    el.style.display = 'none';
                }
            }

            requestAnimationFrame(tick);
        }

        // Waits 2s then polls HEAD / every 2s until the device responds, then redirects to url.
        // The initial 2s delay lets the device start rebooting before polling begins.
        // Uses no-cors to allow cross-origin probes. Updates id="cd" with elapsed seconds.
        // Redirects after maxMs regardless.
        function redirectWhenReachable(url, maxMs) {
            const start = Date.now();
            const displayTimer = setInterval(() => {
                const el = $('#cd');
                if (el) el.innerText = Math.floor((Date.now() - start) / 1000);
            }, 1000);
            setTimeout(() => {
                const pollTimer = setInterval(() => {
                    if (Date.now() - start > maxMs) {
                        clearInterval(displayTimer);
                        clearInterval(pollTimer);
                        location.assign(url);
                        return;
                    }
                    fetch(url, { method: 'HEAD', mode: 'no-cors', cache: 'no-store' })
                        .then(() => { clearInterval(displayTimer); clearInterval(pollTimer); location.assign(url); })
                        .catch(() => {});
                }, 2000);
            }, 2000);
        }

        function triggerEvent(el, evtName) {
            var evt = new Event(evtName, {
                bubbles: true,
                cancelable: true
            });
            el.dispatchEvent(evt);
        }

        function clearMenuAndContent() {
            unloadScripts();
            document.querySelectorAll('#menu .pure-menu-item').forEach(item => item.classList.remove('pure-menu-selected'));
            $('#content').innerHTML = '';
        }

        function handleMenuClick(menuId, headerText, loadFn) {
            const menuElement = $(menuId);
            menuElement.addEventListener("click", (evt) => {
                evt.preventDefault();
                clearMenuAndContent();
                menuElement.classList.add("pure-menu-selected");
                $("#mainHeader").textContent = headerText;
                loadFn();
            });
        }

        handleMenuClick("#menuStatus", "Status", () => load($('#content'), 'tpl-status'));
        handleMenuClick("#menuConfig", "Config", () => load($('#content'), 'tpl-config'));
        handleMenuClick("#menuFirmware", "Firmware", () => load($('#content'), 'tpl-fw'));

        const savedTab = sessionStorage.getItem('activeTab');
        sessionStorage.removeItem('activeTab');
        triggerEvent($(savedTab) || $('#menuStatus'), 'click');
    </script>
</body>

</html>
